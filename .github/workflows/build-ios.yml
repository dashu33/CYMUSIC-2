name: Build iOS IPA

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: yarn install

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Apply patches
        run: npx patch-package

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build unsigned .app
        run: |
          xcodebuild -workspace ios/CyMusic.xcworkspace \
            -scheme CyMusic \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package IPA
        run: |
          set -euo pipefail
          rm -rf Payload CyMusic-unsigned.ipa
          mkdir -p Payload
          # ditto preserves app bundle structure better than cp -r for IPA packaging
          ditto ios/build/Build/Products/Release-iphoneos/CyMusic.app Payload/CyMusic.app
          test -f Payload/CyMusic.app/Info.plist
          test -f Payload/CyMusic.app/CyMusic
          # Create IPA from parent dir so archive root is exactly Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload CyMusic-unsigned.ipa
          # Sanity: ensure Info.plist is at expected path inside zip
          unzip -l CyMusic-unsigned.ipa | grep -q 'Payload/CyMusic.app/Info.plist'

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CyMusic-unsigned-ipa
          path: CyMusic-unsigned.ipa
